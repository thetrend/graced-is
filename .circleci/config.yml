version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:20.9.0  # Adjust Node.js version if needed
    working_directory: ~/repo

jobs:
  build:
    executor: node
    steps:
      - checkout

      # Install pnpm globally
      - run:
          name: Install pnpm
          command: npm install -g pnpm

      # Cache pnpm store
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pnpm-lock.yaml" }}
            - v1-dependencies-

      # Install dependencies with pnpm
      - run:
          name: Install Dependencies
          command: pnpm install

      - save_cache:
          paths:
            - ~/.pnpm-store
          key: v1-dependencies-{{ checksum "pnpm-lock.yaml" }}

      # Build project using Vite
      - run:
          name: Build Project with Vite
          command: pnpm run build

      # Persist build artifacts (optional)
      - persist_to_workspace:
          root: .
          paths:
            - dist  # This is Vite's default output directory, adjust if needed

  deploy:
    executor: node
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo

      # Install Netlify CLI
      - run:
          name: Install Netlify CLI
          command: pnpm add -g netlify-cli

      # Deploy to Netlify
      - run:
          name: Deploy to Netlify
          command: |
            netlify deploy --prod --dir=dist --auth=$NETLIFY_AUTH_TOKEN
          environment:
            NETLIFY_SITE_ID: $NETLIFY_SITE_ID  # Ensure this is set in CircleCI env vars

workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
